<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#061b27" />
    <title>Ocean Atrium Aquarium</title>
  </head>
  <body>
    <main id="app" aria-label="Ocean Atrium aquarium scene">
      <div class="scene-shell">
        <canvas id="aquarium"></canvas>
        <div class="vignette" aria-hidden="true"></div>
        <section class="fish-directory" aria-label="Fish directory">
          <button
            class="fish-directory-toggle"
            id="fish-directory-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="fish-directory-panel"
          >
            <span>Fish</span>
            <span id="fish-directory-count">0</span>
          </button>
          <div class="fish-directory-panel" id="fish-directory-panel" hidden>
            <div class="fish-list" id="fish-list" role="listbox" aria-label="Fish"></div>
          </div>
        </section>
        <section class="plaque" aria-label="Aquarium scene status">
          <p class="eyebrow">Ocean Atrium</p>
          <h1>Living Reef</h1>
          <p class="readout">
            <span>26 C water</span>
            <span>1.024 salinity</span>
            <span>Reef gallery A</span>
          </p>
        </section>
        <section class="fish-inspector" id="fish-inspector" aria-live="polite" hidden>
          <p class="eyebrow">Selected Fish</p>
          <h2 id="selected-fish-name">Miso</h2>
          <dl>
            <div>
              <dt>Type</dt>
              <dd id="selected-fish-type">Orange clownfish</dd>
            </div>
            <div>
              <dt>Size</dt>
              <dd id="selected-fish-size">1.08x</dd>
            </div>
          </dl>
        </section>
      </div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
